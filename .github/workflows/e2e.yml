name: E2E

# Runs the Playwright browser E2E suite (web/e2e). The Playwright config
# (web/playwright.config.ts) auto-starts all three servers itself: the Node
# mock agent, `uv run platform-api` (throwaway SQLite, rate limits off), and the
# Vite dev server. CI just provisions the uv + Node toolchains; no live agent /
# LLM key is needed.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (installs Python from pyproject)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install backend deps
        run: uv sync
        working-directory: .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
